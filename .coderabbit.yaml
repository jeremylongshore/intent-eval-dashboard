# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — intent-eval-dashboard (Intent Eval Platform). Semantic AI code review. Three
# non-overlapping layers: L1 deterministic CI (prettier/markdownlint/yamllint/
# actionlint/typos[/eslint/ruff]) owns style; CodeRabbit (here) owns semantic
# review; CodeQL (security-extended) owns security. CodeRabbit's built-in linters
# are disabled so it never re-reports what L1 already gates. Terse, assertive,
# findings-only. gitleaks (CodeRabbit-native secret scan) stays ON.
language: en-US
tone_instructions: 'Be terse and technical. No preamble, praise, poems, or summaries — findings only: the problem, the file and line, the concrete fix. Flag every real issue; never soft-pedal or skip. Hardcore code review, not a status report.'
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  changed_files_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  tools:
    eslint:
      enabled: false
    ruff:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
  path_filters:
    - '!**/dist/**'
    - '!**/node_modules/**'
    - '!**/coverage/**'
    - '!**/*.snap'
    - '!**/*.lock'
    - '!pnpm-lock.yaml'
  path_instructions:
    - path: '**/src/**'
      instructions: >-
        intent-eval-dashboard ingests signed @intentsolutions/core evidence bundles and
        renders the reports hub. Flag, by priority: (1) rendering unverified or
        attacker-influenced evidence as trusted — an evidence field shown without checking its
        signature/provenance, or HTML/markdown from a bundle injected without escaping (stored
        XSS). (2) ingest that silently swallows a fetch/parse failure and renders
        stale-as-fresh without a last-known-good marker. (3) a local re-declaration of a
        kernel-owned schema/type instead of importing @intentsolutions/core. (4) a
        docblock/UI label claiming data freshness or verification the code does not perform.
        (5) a non-additive change to any published contract.
    - path: '**/*.{sh,yml,yaml}'
      instructions: >-
        Flag deploy/ingest/cron scripts that silently no-op (a fetch whose failure is
        swallowed, a cron that can never fire) and unsafe bash array expansion under `set -u`
        (use `${ARR[@]+"${ARR[@]}"}`).
chat:
  auto_reply: true
