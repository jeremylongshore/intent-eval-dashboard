  <h1>Phase A.0 (ASYMMETRIC — must fail)</h1>
  <!--
    This fixture renders the two arms with ASYMMETRIC structural treatment.

    1. region "walkthrough": Arm B's meta-block carries a `border-left` accent
       (a blue highlight box) that Arm A's lacks — giving the Refiner arm
       visual primacy. (This is the exact asymmetry that existed on the live

    2. region "what": Arm B wraps its summary in <strong>, Arm A does not —
       an extra emphasis on one arm.

    The arm-symmetry scanner must FAIL it.
  -->

    <tbody>
      <tr>
        <td><!-- ARM-A:START id=what -->One shot: take whatever the model returns.<!-- ARM-A:END id=what --></td>
        <td><!-- ARM-B:START id=what --><strong>The full loop: score the edit, keep it only if better.</strong><!-- ARM-B:END id=what --></td>
      </tr>
    </tbody>
  </table>

  <!-- ARM-A:START id=walkthrough -->
  <div class="meta-block">
    <dl>
      <dt>started at</dt><dd><code>86 / 100</code></dd>
      <dt>result</dt><dd><strong>−14 points — worse</strong></dd>
    </dl>
  </div>
  <!-- ARM-A:END id=walkthrough -->

  <!-- ARM-B:START id=walkthrough -->
  <div class="meta-block" style="border-left: 3px solid #2c5282;">
    <dl>
      <dt>started at</dt><dd><code>53 / 100</code></dd>
      <dt>result</dt><dd><strong>+9 points — accepted</strong></dd>
