<!doctype html>
<html lang="en">
  <head>
    <title>arm-symmetry clean fixture</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>Phase A.0 (symmetric)</h1>
      <!--
    This fixture renders BOTH arms with IDENTICAL structural treatment. The
    prose differs (the arms describe different mechanisms) but the skeleton —
    tag sequence, emphasis tags, inline layout styles — is identical between
    Arm A and Arm B. The arm-symmetry scanner must PASS it.
  -->
      <table>
        <thead>
          <tr>
            <th></th>
            <th>
              <!-- ARM-A:START id=table-head --><span>Arm A — "just ask"</span
              ><!-- ARM-A:END id=table-head -->
            </th>
            <th>
              <!-- ARM-B:START id=table-head --><span>Arm B — the Refiner</span
              ><!-- ARM-B:END id=table-head -->
            </th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>What it does</strong></td>
            <td>
              <!-- ARM-A:START id=what -->One shot: take whatever the model returns.<!-- ARM-A:END id=what -->
            </td>
            <td>
              <!-- ARM-B:START id=what -->The full loop: score the edit, keep it only if better.<!-- ARM-B:END id=what -->
            </td>
          </tr>
        </tbody>
      </table>

      <!-- ARM-A:START id=walkthrough -->
      <div class="meta-block">
        <dl>
          <dt>started at</dt>
          <dd><code>86 / 100</code></dd>
          <dt>result</dt>
          <dd><strong>−14 points — worse</strong></dd>
        </dl>
      </div>
      <!-- ARM-A:END id=walkthrough -->

      <!-- ARM-B:START id=walkthrough -->
      <div class="meta-block">
        <dl>
          <dt>started at</dt>
          <dd><code>53 / 100</code></dd>
          <dt>result</dt>
          <dd><strong>+9 points — accepted</strong></dd>
        </dl>
      </div>
      <!-- ARM-B:END id=walkthrough -->
    </main>
  </body>
</html>
