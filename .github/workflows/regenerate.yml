name: Regenerate site (eval-sets + live ingest-render)

# Daily cron (06:00 UTC) + manual workflow_dispatch.
#
# Two refresh passes, both writing into site/ (+ site-internal/), then one
# diff -> commit -> push that fires the existing deploy.yml (paths: site/**):
#
#   1. regenerate.py — reads data/eval-sets.json, queries upstream via gh api
#      for latest version + last-changed date, updates the meta-block cells in
#      per-eval-set HTML pages and regenerates eval-sets/index.html.
#
#   2. scripts/ingest-render.ts (Track #5, bead nr75.10) — the FULL live
#      verify-before-render loop: fetch each repo's signed report-manifest from
#      its GitHub Release, re-verify (OIDC + Rekor + DSSE + kernel schema),
#      content-address + snapshot, then render the public results browser +
#      freshness/status strip + gated internal testing dashboard. A repo that
#      fails verification this run falls back to its prior VERIFIED snapshot with
#      a stale badge (NEVER a synthetic pass); a repo that has NEVER verified
#      renders honest no-data. The script exits non-zero ONLY on machinery
#      failure (build/import/crash) (the 7-day-silence binding owns paging, not
#      this cron). The rendered HTML under site/ + site-internal/ is the
#      committed artifact, so daily commit churn is expected (freshness is the
#      point).
#
# LAST-KNOWN-GOOD PERSISTENCE (bead nr75.17, after the 2026-06-08 incident):
# .ingest-store/ holds the per-repo VERIFIED snapshots + content-addressed
# bundles + gate-result bodies. It is gitignored, so committing it would NOT
# persist it across runs (and a committed-store write via GITHUB_TOKEN would not
# fire deploy.yml anyway — see the "Trigger deploy" note). Instead we persist it
# via actions/cache, keyed per-repo+run with a restore-keys fallback so each run
# restores the most recent prior store. The renderer already serves a failed
# repo's prior-good snapshot (src/ingest/renderer.ts buildRenderInput stamps
# staleSince) — persisting the store is what makes a PARTIAL fetch failure (e.g.
# 2 of 4 verify) keep the unfetched rows live-but-stale instead of regressing
# them to no-data. Proof: src/ingest/partial-fetch-lkg.test.ts.
#
# On failure: posts to ntfy prod-alerts topic (matches ops-lite pattern
# per DR-035 § 5 D3). The 7-day-silence pager threshold doesn't apply
# here — this is a content refresh, not a security signal.
#
# Per puxu.13 (eval-set refresh) + nr75.10 (live ingest-render).

on:
  schedule:
    # 06:00 UTC daily (= midnight Central / 23:00 Pacific / 02:00 Eastern)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Force commit even if no diff (debug only)'
        type: boolean
        default: false

permissions:
  contents: write # commit + push regenerated HTML
  actions:
    write # gh workflow run deploy.yml (the GITHUB_TOKEN push below does
    # NOT auto-fire deploy.yml — see the "Trigger deploy" step)

concurrency:
  group: regenerate-${{ github.repository }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push back. token defaults to GITHUB_TOKEN
          # which has contents:write per permissions block above.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node toolchain for the live ingest-render pass (Track #5) ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (ingest-render imports the compiled dist/)
        run: pnpm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run regenerate.py (eval-set meta refresh)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/regenerate.py

      # Restore the persisted last-known-good ingest store (bead nr75.17). The
      # cache holds .ingest-store/ — every repo's prior VERIFIED snapshot +
      # content-addressed bundles + gate-result bodies. The keyed entry is unique
      # per run (so each run writes a fresh entry — actions/cache entries are
      # immutable), and restore-keys falls back to the newest prior entry. If the
      # cache is cold (first run / eviction), the store starts empty and repos
      # that fail to fetch render honest no-data until their first verify — the
      # correct floor, never a synthetic pass.
      - name: Restore last-known-good ingest store (nr75.17)
        uses: actions/cache/restore@v4
        with:
          path: .ingest-store
          key: ingest-store-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ingest-store-

      # Live verify-before-render: fetch each repo's signed report-manifest from
      # its GitHub Release, re-verify (OIDC + Rekor + DSSE + kernel schema), and
      # render site/ + site-internal/ from the VERIFIED snapshots. A repo that
      # fails this run falls back to its restored prior-good snapshot (stale
      # badge); a never-verified repo renders no-data. Exits non-zero only on
      # machinery failure.
      #
      # TRANSIENT-BLACKOUT GUARD (added after the 2026-06-08 incident, run
      # 27123737379): the manifests are fetched over unauthenticated HTTPS from
      # GitHub Releases, which can momentarily rate-limit / blip on a shared
      # Actions-runner IP — verifying 0 repos. With the persisted store (nr75.17)
      # a PARTIAL miss no longer regresses unfetched rows: the renderer serves
      # their prior-good snapshots. The remaining concern is a TOTAL blackout (0
      # verified) on a COLD cache, where there is no prior-good to fall back to
      # and committing would render all-no-data. So: if 0 repos verify, retry
      # once after a backoff; if STILL 0, treat it as a transient blackout and
      # SKIP commit/deploy (the prior good deploy stays live). Any real result
      # (>=1 verified) proceeds normally. NOTE: the retry does NOT wipe
      # .ingest-store — that would destroy the restored last-known-good
      # snapshots, regressing a partial-success render. The stores are
      # content-addressed + idempotent (a snapshot is written ONLY on a full
      # verify), so re-running over the same store is safe and preserves
      # prior-good for any repo that fails again.
      - name: Live ingest → render (nr75.10)
        id: ingest
        run: |
          run_ingest() {
            node --experimental-strip-types scripts/ingest-render.ts --root .ingest-store 2>&1 | tee /tmp/ingest.log
          }
          run_ingest || true
          verified=$(grep -c ': VERIFIED' /tmp/ingest.log || true)
          if [ "${verified:-0}" -eq 0 ]; then
            echo "::warning::ingest verified 0 repos — likely a transient manifest-fetch blackout; retrying once after 45s backoff (last-known-good store preserved)"
            sleep 45
            run_ingest || true
            verified=$(grep -c ': VERIFIED' /tmp/ingest.log || true)
          fi
          echo "verified=${verified:-0}" >> "$GITHUB_OUTPUT"
          if [ "${verified:-0}" -eq 0 ]; then
            echo "blackout=true" >> "$GITHUB_OUTPUT"
            echo "::warning::ingest still verified 0 repos after retry — transient blackout. SKIPPING commit/deploy so the prior good labs deploy stays live (no regression to all-no-data)."
          else
            echo "::notice::ingest verified ${verified} repo(s) — proceeding."
          fi

      # Persist the updated last-known-good store for the next run (bead nr75.17).
      # Save ALWAYS (even on a 0-verified blackout) so any prior-good snapshots
      # that survived this run carry forward. The keyed entry is unique per run
      # so the immutable-cache write never collides; the next run's restore-keys
      # prefix picks up this newest entry. Skipped only when no store exists
      # (cold cache + total fetch failure → nothing to persist).
      - name: Save last-known-good ingest store (nr75.17)
        if: always() && hashFiles('.ingest-store/**') != ''
        uses: actions/cache/save@v4
        with:
          path: .ingest-store
          key: ingest-store-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::no diff — nothing to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::diff detected — will commit"
            git diff --stat
          fi

      - name: Commit + push
        if: (steps.diff.outputs.changed == 'true' || inputs.force_commit == true) && steps.ingest.outputs.blackout != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -s -m "chore(regenerate): site refresh (eval-sets + live ingest-render)

          $(date -u +%FT%TZ) — automated refresh. eval-set meta from upstream
          (scripts/regenerate.py + data/eval-sets.json) + live verify-before-render
          ingest of every repo's signed report-manifest (scripts/ingest-render.ts).
          Triggered by ${{ github.event_name == 'schedule' && 'daily cron' || 'workflow_dispatch' }}.

          bd: bd_000-projects-puxu.13 + bd_000-projects-nr75.10"
          git push

      # A push made with the default GITHUB_TOKEN does NOT trigger other
      # workflows (GitHub's recursion guard), so the commit above would NOT
      # auto-fire deploy.yml and labs would never refresh from the cron. The
      # documented exception is workflow_dispatch / repository_dispatch: a
      # GITHUB_TOKEN MAY start a run via those. So we explicitly dispatch
      # deploy.yml on main — by which point `git push` has already landed the
      # new commit on origin/main, so deploy's `git reset --hard origin/main`
      # picks it up. This is what makes the cron actually self-update labs.
      - name: Trigger deploy (GITHUB_TOKEN push does not auto-fire deploy.yml)
        if: (steps.diff.outputs.changed == 'true' || inputs.force_commit == true) && steps.ingest.outputs.blackout != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main

      - name: Notify on failure
        if: failure()
        run: |
          # ntfy push notification matches ops-lite pattern per DR-035 D3.
          # NTFY_URL is a public tailnet-only ntfy on the VPS; topic prod-alerts.
          # If ntfy is unreachable from GH Actions runner (it's tailnet-only),
          # this just logs the attempt — primary alerting is GH Actions
          # email failure notifications which already fire by default.
          echo "::warning::regenerate.yml failed at $(date -u +%FT%TZ) — GitHub Actions email alert fires by default; ntfy is tailnet-only so will skip from runner"
