name: Regenerate site (eval-sets + live ingest-render)

# Daily cron (06:00 UTC) + manual workflow_dispatch.
#
# Two refresh passes, both writing into site/ (+ site-internal/), then one
# diff -> commit -> push that fires the existing deploy.yml (paths: site/**):
#
#   1. regenerate.py — reads data/eval-sets.json, queries upstream via gh api
#      for latest version + last-changed date, updates the meta-block cells in
#      per-eval-set HTML pages and regenerates eval-sets/index.html.
#
#   2. scripts/ingest-render.ts (Track #5, bead nr75.10) — the FULL live
#      verify-before-render loop: fetch each repo's signed report-manifest from
#      its GitHub Release, re-verify (OIDC + Rekor + DSSE + kernel schema),
#      content-address + snapshot, then render the public results browser +
#      freshness/status strip + gated internal testing dashboard. A repo that
#      fails verification fail-closes to no-data (NEVER a synthetic pass); the
#      script exits non-zero ONLY on machinery failure (build/import/crash), so
#      a transient upstream blip refreshes to honest no-data rather than paging
#      (the 7-day-silence binding owns paging, not this cron). .ingest-store/ is
#      ephemeral per run (gitignored) — re-fetched + re-verified every time; the
#      rendered HTML under site/ + site-internal/ is the committed artifact, so
#      daily commit churn is expected (freshness is the point).
#
# On failure: posts to ntfy prod-alerts topic (matches ops-lite pattern
# per DR-035 § 5 D3). The 7-day-silence pager threshold doesn't apply
# here — this is a content refresh, not a security signal.
#
# Per puxu.13 (eval-set refresh) + nr75.10 (live ingest-render).

on:
  schedule:
    # 06:00 UTC daily (= midnight Central / 23:00 Pacific / 02:00 Eastern)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Force commit even if no diff (debug only)'
        type: boolean
        default: false

permissions:
  contents: write   # commit + push regenerated HTML

concurrency:
  group: regenerate-${{ github.repository }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to push back. token defaults to GITHUB_TOKEN
          # which has contents:write per permissions block above.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node toolchain for the live ingest-render pass (Track #5) ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (ingest-render imports the compiled dist/)
        run: pnpm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run regenerate.py (eval-set meta refresh)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/regenerate.py

      # Live verify-before-render: fetch each repo's signed report-manifest from
      # its GitHub Release, re-verify (OIDC + Rekor + DSSE + kernel schema), and
      # render site/ + site-internal/ from the VERIFIED snapshots. Fail-closes to
      # no-data per repo; exits non-zero only on machinery failure (= the smoke).
      - name: Live ingest → render (nr75.10)
        run: node --experimental-strip-types scripts/ingest-render.ts --root .ingest-store

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "::notice::no diff — nothing to commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::diff detected — will commit"
            git diff --stat
          fi

      - name: Commit + push
        if: steps.diff.outputs.changed == 'true' || inputs.force_commit == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -s -m "chore(regenerate): site refresh (eval-sets + live ingest-render)

          $(date -u +%FT%TZ) — automated refresh. eval-set meta from upstream
          (scripts/regenerate.py + data/eval-sets.json) + live verify-before-render
          ingest of every repo's signed report-manifest (scripts/ingest-render.ts).
          Triggered by ${{ github.event_name == 'schedule' && 'daily cron' || 'workflow_dispatch' }}.

          bd: bd_000-projects-puxu.13 + bd_000-projects-nr75.10"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          # ntfy push notification matches ops-lite pattern per DR-035 D3.
          # NTFY_URL is a public tailnet-only ntfy on the VPS; topic prod-alerts.
          # If ntfy is unreachable from GH Actions runner (it's tailnet-only),
          # this just logs the attempt — primary alerting is GH Actions
          # email failure notifications which already fire by default.
          echo "::warning::regenerate.yml failed at $(date -u +%FT%TZ) — GitHub Actions email alert fires by default; ntfy is tailnet-only so will skip from runner"
