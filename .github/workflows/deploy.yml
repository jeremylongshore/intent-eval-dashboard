name: Deploy

# Push to main → CI → Tailscale OIDC → SSH to intentsolutions VPS →
# /usr/local/sbin/deploy-intent-eval-dashboard (force-command on the deploy key)
# does git fetch + git reset --hard origin/main → smoke-test passes.
#
# v0.1.0 site format: single-file HTML per page (no build step). Caddy
# serves directly from /srv/intent-eval-dashboard/site/. The deploy
# script just updates the checkout in place.
#
# Astro adopted at Phase 2 when interactive surfaces arrive (puxu.6/puxu.7);
# pre-deploy gate will then add `pnpm install + pnpm build` steps.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for Tailscale OIDC

concurrency:
  group: deploy-vps-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: pre-deploy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML sanity checks
        run: |
          set -euo pipefail
          FAILED=0
          for f in $(find site -name "*.html"); do
            if ! grep -q "<!DOCTYPE html>" "$f"; then
              echo "::error file=$f::missing DOCTYPE"
              FAILED=1
            fi
            if ! grep -q "</html>" "$f"; then
              echo "::error file=$f::missing closing </html> tag"
              FAILED=1
            fi
            if ! grep -q '<link rel="stylesheet" href="/style.css">' "$f"; then
              echo "::error file=$f::missing stylesheet link"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] && echo "✓ all HTML files pass DOCTYPE + closing tag + stylesheet checks"
          exit $FAILED

      # C3 HARD INTEGRITY GATE (DR-035 § 4 C3 — CTO + CMO + VP DevRel triple
      # refusal): NO aggregate PASS% spanning MULTIPLE predicate URIs in the
      # rendered output. A count scoped to a single predicate URI is permitted.
      # This is the REAL cross-predicate-aware scanner (scripts/lint-no-aggregate
      # -pass.ts → src/results/c3-scan.ts), NOT the prior naive grep which could
      # false-positive on a legitimate single-predicate count.
      #
      # The scanner is self-contained (zero imports) so it runs under Node's
      # built-in --experimental-strip-types with NO install, NO build, NO kernel
      # checkout — keeping this static-deploy job cheap.
      #
      # Run the script DIRECTLY — NEVER pipe through `tee` without `set -o
      # pipefail`, or the non-zero exit is masked (the intent-eval-core
      # boundary-check.yml bug). The script's exit code IS the step's exit code.
      - name: Set up Node (for the C3 scanner)
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: C3 aggregate-PASS% gate (whole site)
        run: node --experimental-strip-types scripts/lint-no-aggregate-pass.ts site
      - name: C3 scanner self-check (synthetic violation MUST fail)
        run: |
          set -euo pipefail
          if node --experimental-strip-types scripts/lint-no-aggregate-pass.ts src/results/__fixtures__/c3-violation.html; then
            echo "::error::C3 scanner did NOT flag the known cross-predicate aggregate-PASS% fixture — scanner broken/neutered."
            exit 1
          fi
          echo "✓ C3 scanner correctly fails on the synthetic violation fixture."

      # NO-UPTIME-SLA-CLAIM GATE (DR-035 § 8 — CFO refusal): this is a
      # best-effort, single-operator dashboard. It must NEVER advertise an uptime
      # SLA. "99.9% uptime", uptime/availability guarantees, "N nines" — all
      # forbidden in the public output. The public commitment is exactly
      # "best-effort, single-operator, see /status for liveness".
      #
      # Same execution discipline as the C3 gate: self-contained scanner
      # (src/alerting/no-uptime-scan.ts), run DIRECTLY (no `tee` masking), the
      # script's exit code IS the step's exit code.
      - name: No-uptime-SLA-claim gate (whole site)
        run: node --experimental-strip-types scripts/check-uptime-claims.ts site
      - name: Uptime-claim scanner self-check (synthetic violation MUST fail)
        run: |
          set -euo pipefail
          if node --experimental-strip-types scripts/check-uptime-claims.ts src/alerting/__fixtures__/uptime-violation.html; then
            echo "::error::uptime-claim scanner did NOT flag the known uptime-SLA fixture — scanner broken/neutered."
            exit 1
          fi
          echo "✓ uptime-claim scanner correctly fails on the synthetic violation fixture."

      - name: Predicate-URI-at-labs scan
        # DR-010 + DR-035 CISO binding: predicate URIs MUST live at
        # evals.intentsolutions.io exclusively. Refuses any URL of shape
        # labs.intentsolutions.io/<predicate>/v<N> in site content.
        run: |
          set -euo pipefail
          if grep -rEn "labs\.intentsolutions\.io/[a-z-]+/v[0-9]+" site/ ; then
            echo "::error::CISO binding violation — predicate URI declared under labs.* (must be evals.*)"
            exit 1
          fi
          echo "✓ Predicate-URI-at-labs scan: no violations"

      - name: Verify required smoke files present
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/healthz
          test -f site/style.css
          test -f site/eval-sets/index.html
          test -f site/methodology/index.html
          test -f site/status/index.html
          echo "✓ all required smoke files present"

  deploy:
    needs: test
    uses: jeremylongshore/.github/.github/workflows/vps-deploy.yml@709a07fbebb1d51806e171204e63f5332abcb0da
    with:
      variant: static
      srv-path: /srv/intent-eval-dashboard
      health-check-url: https://labs.intentsolutions.io/healthz
      vps-tailnet-ip: 100.88.144.55
      vps-public-ip: 167.86.106.29
      vps-host: intentsolutions
      vps-user: intentsolutions
      # /healthz returns plain "ok" (not JSON) — empty filter means 2xx alone = pass
      smoke-validation: ''
    secrets:
      TS_OIDC_CLIENT_ID: ${{ secrets.TS_OIDC_CLIENT_ID }}
      TS_AUDIENCE: ${{ secrets.TS_AUDIENCE }}
      VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
