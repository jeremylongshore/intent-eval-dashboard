name: Deploy

# Push to main → CI → Tailscale OIDC → SSH to intentsolutions VPS →
# /usr/local/sbin/deploy-intent-eval-dashboard (force-command on the deploy key)
# does git fetch + rsync of site/ static HTML → smoke-test passes.
#
# v0.1.0 site format: single-file HTML per page (no build step). Deploy is
# pure rsync of site/*.html + site/style.css to /srv/intent-eval-dashboard/.
# Astro adopted at Phase 2 when interactive surfaces arrive (puxu.6/puxu.7).
#
# v0.1.0 scaffolding: this workflow is a PLACEHOLDER. Real pre-deploy gate +
# deploy logic activates when Phase 1 Epic 1.3 (puxu.3) ships the site/
# HTML tree. Until then, this workflow just checks the repo's hard-refusal
# guardrails (partner-name-guard.yml fires independently on doc paths).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for Tailscale OIDC

concurrency:
  group: deploy-vps-${{ github.repository }}
  cancel-in-progress: false

jobs:
  placeholder:
    name: pre-deploy placeholder (v0.1.0 scaffolding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: v0.1.0 scaffolding marker
        run: |
          echo "v0.1.0 scaffolding — no site/ HTML yet; pre-deploy gate activates with Epic 1.3 (puxu.3)."
          test -f README.md
          test -f CLAUDE.md
          test -f LICENSE
          test -f package.json
          test -d site
          test -d cmd/labs-tui
          echo "✓ Scaffolding layout intact."

