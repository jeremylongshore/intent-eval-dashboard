# fail2ban filter for the gated internal testing dashboard (CISO lift-over 4).
#
# Install on the VPS as /etc/fail2ban/filter.d/caddy-internal-testing.conf
# Pairs with deploy/fail2ban/internal-testing-jail.local.
#
# Matches HTTP 401 (failed basic auth) lines in Caddy's JSON access log for the
# internal.intentsolutions.io site and bans the source IP after repeated misses.
# This is the committed rate-limit fallback for when the caddy-ratelimit module
# is not built into the VPS Caddy binary.

[Definition]
# Caddy JSON access log: a failed basic_auth attempt is status 401. The client
# IP is in request.remote_ip. Field order in Caddy's JSON is stable
# (request before status), but the patterns are anchored loosely to tolerate it.
failregex = ^.*"remote_ip":"<HOST>".*"status":401.*$
            ^.*"status":401.*"remote_ip":"<HOST>".*$

ignoreregex =

# Caddy JSON timestamps are unix epoch floats; let fail2ban use its own read time.
datepattern = {^LN-BEG}
