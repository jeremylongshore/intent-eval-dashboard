# typos (crate-ci/typos) configuration for intent-eval-dashboard.
#
# L1 source-spelling lane (.github/workflows/typos.yml). This file holds the
# Intent Eval Platform (IEP) domain vocabulary that typos must NOT flag as
# misspellings — repo/family prefixes, ISEDC council-seat acronyms, tooling
# names, and crypto/supply-chain terms that are correct-as-written. Add new
# legitimate terms here rather than rewording prose to satisfy the checker.

[files]
# Generated, vendored, and lockfile surfaces are not authored prose — exclude
# them so the lane only reports on human-written content. site/ + site-internal/
# are machine-regenerated by regenerate.yml (the generator is the source of
# truth, not this checker); .ingest-store/ is content-addressed binary-ish data.
extend-exclude = [
  "node_modules/",
  "dist/",
  "coverage/",
  ".beads/",
  "*.lock",
  "pnpm-lock.yaml",
  "site/",
  "site-internal/",
  ".ingest-store/",
]

[default.extend-words]
# IEP repo + bead-prefix family. These are deliberate identifiers, not typos.
iep = "iep"
iec = "iec"
iel = "iel"
iah = "iah"
iar = "iar"
iaj = "iaj"
isedc = "isedc"

# ISEDC council-seat acronyms (CTO · GC · CMO · CFO · CSO · CISO · VP DevRel).
# `CMO` (Chief Marketing Officer) is a council seat referenced throughout the
# DR-035 bindings; typos otherwise "corrects" it to COM.
cmo = "cmo"
ciso = "ciso"
cso = "cso"

# Supply-chain / crypto / tooling vocabulary.
sops = "sops"
sigstore = "sigstore"
rekor = "rekor"
zod = "zod"
otel = "otel"
ot = "ot"

# Common engineering abbreviations + domain terms typos over-corrects.
deps = "deps"
crate = "crate"
ser = "ser"
# "unparseable" — the spelling used consistently across the alerting + freshness
# + results fail-closed paths ("unparseable clock", "unparseable last-ingest");
# correct-as-written, not a misspelling of "unparsable".
unparseable = "unparseable"
# "criticals" — the alerting domain plural for the critical-alert list.
criticals = "criticals"
# "PLACEHOLDE" — over-split token from the intentional bcrypt placeholder string
# `$2a$14$PLACEHOLDER.PLACEHOLDER...` in deploy/internal-testing.caddy.
PLACEHOLDE = "PLACEHOLDE"
